<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - FaderDeck</title>
    <style>
        :root {
            --primary-color: #00d4aa;
            --bg-dark: #1a1a1a;
            --bg-darker: #0f0f0f;
            --text-light: #f5f5f5;
            --text-gray: #a0a0a0;
            --border-color: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-section {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.3s;
            animation: slideFromTop 0.6s ease-out;
        }

        .logo-section:hover {
            opacity: 0.8;
        }

        .logo-section img {
            width: 64px;
            height: 64px;
            border-radius: 12px;
        }

        .logo-section h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .auth-box {
            width: 100%;
            background-color: var(--bg-darker);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            animation: slideFromBottom 0.6s ease-out 0.2s both;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary-color);
        }

        .form-input::placeholder {
            color: var(--text-gray);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .password-toggle:hover {
            opacity: 1;
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            fill: var(--text-light);
        }

        .register-link {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--primary-color);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .register-link:hover {
            opacity: 0.8;
        }

        .telegram-btn {
            width: 100%;
            padding: 14px 20px;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .telegram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.3);
        }

        .telegram-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .login-btn {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--primary-color);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 170, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-gray);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        @keyframes slideFromTop {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideFromBottom {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            animation: slideFromTop 0.6s ease-out;
        }

        .auth-box {
            animation: slideFromBottom 0.6s ease-out 0.2s both;
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 30px 20px;
            }

            .logo-section img {
                width: 64px;
                height: 64px;
            }

            .logo-section h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="logo-section" id="logoSection">
            <img src="assets/FaderDeckIcon256x256.png" alt="FaderDeck">
            <h1 id="logoTitle">FaderDeck</h1>
        </a>

        <div class="auth-box">
            <form id="authForm">
                <div class="form-group">
                    <label class="form-label" id="usernameLabel">Логин</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="username" placeholder="Введите логин" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" id="passwordLabel">Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="Введите пароль" required>
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <svg id="eyeIcon" viewBox="0 0 24 24">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Войти</button>

                <a href="#register" class="register-link" id="registerLink">Зарегистрироваться</a>

                <div class="divider" id="dividerText">или</div>

                <button type="button" class="telegram-btn" id="telegramBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.832.941z"/>
                    </svg>
                    <span id="telegramBtnText">Войти через Telegram</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const translations = {
            ru: {
                title: 'FaderDeck',
                pageTitle: 'Вход - FaderDeck',
                usernameLabel: 'Логин',
                usernamePlaceholder: 'Введите логин',
                passwordLabel: 'Пароль',
                passwordPlaceholder: 'Введите пароль',
                loginBtn: 'Войти',
                registerLink: 'Зарегистрироваться',
                divider: 'или',
                telegramBtn: 'Войти через Telegram'
            },
            en: {
                title: 'FaderDeck',
                pageTitle: 'Login - FaderDeck',
                usernameLabel: 'Username',
                usernamePlaceholder: 'Enter username',
                passwordLabel: 'Password',
                passwordPlaceholder: 'Enter password',
                loginBtn: 'Login',
                registerLink: 'Sign up',
                divider: 'or',
                telegramBtn: 'Login with Telegram'
            }
        };

        let currentLang = localStorage.getItem('language') || 'ru';

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            const t = translations[lang];

            document.title = t.pageTitle;
            document.getElementById('logoTitle').textContent = t.title;
            document.getElementById('usernameLabel').textContent = t.usernameLabel;
            document.getElementById('username').placeholder = t.usernamePlaceholder;
            document.getElementById('passwordLabel').textContent = t.passwordLabel;
            document.getElementById('password').placeholder = t.passwordPlaceholder;
            document.getElementById('loginBtn').textContent = t.loginBtn;
            document.getElementById('registerLink').textContent = t.registerLink;
            document.getElementById('dividerText').textContent = t.divider;
            document.getElementById('telegramBtnText').textContent = t.telegramBtn;

            document.documentElement.lang = lang;
        }

        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeIcon = document.getElementById('eyeIcon');

        const eyeOpenPath = 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z';
        const eyeClosedPath = 'M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z';

        let isPasswordVisible = false;

        passwordToggle.addEventListener('click', function() {
            isPasswordVisible = !isPasswordVisible;
            
            if (isPasswordVisible) {
                passwordInput.type = 'text';
                eyeIcon.querySelector('path').setAttribute('d', eyeClosedPath);
            } else {
                passwordInput.type = 'password';
                eyeIcon.querySelector('path').setAttribute('d', eyeOpenPath);
            }
        });

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('Форма отправлена');
        });

        document.getElementById('telegramBtn').addEventListener('click', function() {
            console.log('Вход через Telegram');
        });

        changeLanguage(currentLang);
    </script>
</body>
</html>
